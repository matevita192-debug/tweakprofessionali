<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mate's WinTweaks • Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --accent: #00c8ff;
  --text: #f0f0f0;
  --muted: #aaaaaa;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

header {
  padding: 120px 20px 80px;
  background: linear-gradient(to bottom, rgba(0,200,255,0.06), transparent);
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 82px;
  font-weight: 700;
  background: linear-gradient(90deg, #ffffff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}

.subtitle {
  font-size: 24px;
  color: var(--muted);
  max-width: 700px;
  margin: 0 auto 80px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
}

.redeem-card {
  background: var(--surface);
  border: 1px solid #222;
  border-radius: 24px;
  padding: 60px 50px;
  max-width: 520px;
  margin: 0 auto 80px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

input {
  width: 100%;
  padding: 22px;
  font-size: 24px;
  background: #1a1a1a;
  border: 1px solid #444;
  border-radius: 16px;
  color: white;
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, var(--accent), #0099cc);
  border: none;
  border-radius: 16px;
  color: #000;
  cursor: pointer;
  transition: all 0.3s;
}

button:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 35px rgba(0,200,255,0.4);
}

.result {
  margin-top: 25px;
  min-height: 40px;
  font-size: 18px;
}

.success-screen {
  display: none;
  margin: 40px auto;
  padding: 50px;
  background: #0f1a14;
  border: 1px solid #00ff9d;
  border-radius: 20px;
  max-width: 520px;
}
</style>
</head>
<body>

<header>
  <h1>MATE</h1>
  <p class="subtitle">Windows Optimization Suite — Pulito, Veloce, Privato</p>
</header>

<div class="container">
  <div class="redeem-card">
    <h2 style="margin-bottom:20px; font-size:28px;">Riscatta la tua licenza Premium</h2>
    <p style="color:var(--muted); margin-bottom:35px;">Inserisci il codice che ti è stato fornito</p>
    
    <input type="text" id="code" placeholder="INSERISCI CODICE" maxlength="12" autofocus>
    <button onclick="redeemCode()">ATTIVA LICENZA</button>
    
    <div id="result" class="result"></div>
  </div>

  <div id="successScreen" class="success-screen">
    <h2 style="color:#00ff9d; margin-bottom:20px;">✅ Licenza attivata con successo!</h2>
    <p style="font-size:20px; margin:20px 0;">Grazie per aver scelto Mate's WinTweaks.<br>Il tuo PC è ora ottimizzato al massimo.</p>
    <button onclick="openTweaks()" style="background:#00ff9d; color:#000; padding:18px 50px; font-size:19px; border:none; border-radius:16px; cursor:pointer;">APRI WINTWEAKS</button>
  </div>
</div>

<script>
function redeemCode() {
  const code = document.getElementById('code').value.trim().toUpperCase();
  const result = document.getElementById('result');

  if (!code) {
    result.innerHTML = '<span style="color:#ff6666">Inserisci un codice valido</span>';
    return;
  }

  result.innerHTML = 'Verifica in corso...';

  setTimeout(() => {
    result.innerHTML = '<span style="color:#00ff9d">✅ Codice valido!</span>';
    document.getElementById('successScreen').style.display = 'block';
  }, 900);
}

function openTweaks() {
  window.open('https://matevita192-debug.github.io/tweakprofessionali/wintweaks.html', '_blank');
}
</script>

</body>
</html>
