<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mate's WinTweaks • Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --accent: #00d4ff;
  --text: #e0e0e0;
  --muted: #888888;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  text-align: center;
  min-height: 100vh;
  line-height: 1.6;
}

header {
  padding: 100px 20px 60px;
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 68px;
  font-weight: 700;
  background: linear-gradient(90deg, #ffffff, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.subtitle {
  font-size: 22px;
  color: var(--muted);
  margin-bottom: 60px;
}

.main-box {
  background: var(--surface);
  border: 1px solid #222;
  border-radius: 20px;
  padding: 60px 40px;
  max-width: 520px;
  margin: 0 auto;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 20px;
  font-size: 22px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 12px;
  color: white;
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 18px;
  font-size: 19px;
  font-weight: 600;
  background: linear-gradient(90deg, #00d4ff, #0099cc);
  border: none;
  border-radius: 12px;
  color: #000;
  cursor: pointer;
  transition: all 0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,212,255,0.3);
}

.result {
  margin-top: 25px;
  min-height: 40px;
  font-size: 18px;
}

.success-screen {
  display: none;
  margin-top: 40px;
  padding: 40px;
  background: #0f1a14;
  border: 1px solid #00ff9d;
  border-radius: 16px;
}

.success-screen h2 {
  color: #00ff9d;
  font-size: 36px;
  margin-bottom: 15px;
}
</style>
</head>
<body>

<header>
  <h1>MATE</h1>
  <p class="subtitle">Windows Optimization Suite</p>
</header>

<div class="main-box">
  <h2 style="margin-bottom:10px; font-size:28px;">Riscatta la tua licenza</h2>
  <p style="color:var(--muted); margin-bottom:30px;">Inserisci il codice che ti è stato fornito</p>
  
  <input type="text" id="code" placeholder="INSERISCI CODICE" maxlength="12" autofocus>
  <button onclick="redeemCode()">ATTIVA LICENZA</button>
  
  <div id="result" class="result"></div>
</div>

<div id="successScreen" class="success-screen">
  <h2>✅ Attivazione completata!</h2>
  <p style="font-size:19px; margin:20px 0;">Grazie per aver scelto Mate's WinTweaks.<br>Il tuo PC è ora ottimizzato.</p>
  <button onclick="openTweaks()" style="background:#00ff9d; color:#000; padding:16px 40px; font-size:18px;">APRI WINTWEAKS</button>
</div>

<script>
function redeemCode() {
  const code = document.getElementById('code').value.trim().toUpperCase();
  const result = document.getElementById('result');

  if (!code) {
    result.innerHTML = '<span style="color:#ff6666">Inserisci un codice valido</span>';
    return;
  }

  result.innerHTML = 'Verifica in corso...';

  setTimeout(() => {
    result.innerHTML = '<span style="color:#00ff9d">✅ Codice valido!</span>';
    document.getElementById('successScreen').style.display = 'block';
  }, 700);
}

function openTweaks() {
  window.open('https://matevita192-debug.github.io/grokas/wintweaks.html', '_blank');
}
</script>

</body>
</html>
